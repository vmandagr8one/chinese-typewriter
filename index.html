<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Stroke Typewriter</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; text-align: center; background: #eef2f3; padding: 20px; color: #2c3e50; }
        .container { max-width: 400px; margin: auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid #bdc3c7; }
        h2 { margin-top: 0; color: #2980b9; text-transform: uppercase; letter-spacing: 2px; }
        #canvas { border: 3px solid #34495e; background: #fff; touch-action: none; margin: 15px auto; cursor: crosshair; display: block; border-radius: 5px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 1; padding: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.1s; }
        .btn-clear { background: #c0392b; color: white; }
        .btn-go { background: #27ae60; color: white; }
        button:active { transform: translateY(2px); }
        #status-bar { font-size: 12px; color: #7f8c8d; margin-bottom: 10px; height: 18px; font-style: italic; }
        .output-char { font-size: 80px; margin: 10px 0; font-weight: bold; color: #2c3e50; }
        .others { color: #95a5a6; font-size: 18px; letter-spacing: 4px; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Typewriter v2.0</h2>
    <div id="status-bar">Diagnostic: System Ready</div>
    
    <canvas id="canvas" width="300" height="300"></canvas>
    
    <div class="btn-group">
        <button class="btn-clear" onclick="resetPad()">RESET</button>
        <button class="btn-go" onclick="runDiagnostic()">IDENTIFY</button>
    </div>

    <div id="display">
        <div class="output-char" id="main-result">?</div>
        <div class="others" id="sub-results"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let strokeData = []; 
    let xArr = [], yArr = [], tArr = [];

    // Capture Canvas Position
    function getXY(e) {
        const rect = canvas.getBoundingClientRect();
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        return [cx - rect.left, cy - rect.top];
    }

    // Input Handlers
    canvas.addEventListener('mousedown', (e) => {
        isDrawing = true;
        xArr = []; yArr = []; tArr = [];
        const [x, y] = getXY(e);
        ctx.beginPath();
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#2c3e50';
        ctx.moveTo(x, y);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing) return;
        const [x, y] = getXY(e);
        ctx.lineTo(x, y);
        ctx.stroke();
        xArr.push(Math.round(x));
        yArr.push(Math.round(y));
        tArr.push(Date.now());
    });

    window.addEventListener('mouseup', () => {
        if (!isDrawing) return;
        isDrawing = false;
        strokeData.push([xArr, yArr, tArr]);
    });

    // Touch support for testing on phone later
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); });

    function resetPad() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        strokeData = [];
        document.getElementById('main-result').innerText = "?";
        document.getElementById('sub-results').innerText = "";
        document.getElementById('status-bar').innerText = "Diagnostic: Ready";
    }

    function runDiagnostic() {
        if (strokeData.length === 0) {
            document.getElementById('status-bar').innerText = "Error: No strokes detected.";
            return;
        }
        
        document.getElementById('status-bar').innerText = "Diagnostic: Sending to Google...";
        
        const payload = JSON.stringify({
            "options": "enable_pre_space",
            "requests": [{
                "writing_guide": { "width": 300, "height": 300 },
                "ink": strokeData,
                "language": "zh"
            }]
        });

        const callbackID = 'callback_' + Date.now();
        
        // Window Listener for the Response
        window[callbackID] = function(data) {
            if (data && data[0] === "SUCCESS") {
                const chars = data[1][0][1];
                document.getElementById('main-result').innerText = chars[0];
                document.getElementById('sub-results').innerText = chars.slice(1, 6).join(' ');
                document.getElementById('status-bar').innerText = "Diagnostic: Success.";
            } else {
                document.getElementById('status-bar').innerText = "Diagnostic: Server returned error.";
            }
            cleanup();
        };

        const scriptTag = document.createElement('script');
        scriptTag.id = "api-script";
        scriptTag.onerror = () => {
            document.getElementById('status-bar').innerText = "CRITICAL: Script Blocked by Chrome.";
            cleanup();
        };
        
        // This is the specific handwriting engine URL
        scriptTag.src = `https://www.google.com/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8&itc=zh-t-i0-handwrit&input=${encodeURIComponent(payload)}&callback=${callbackID}`;
        
        function cleanup() {
            if (document.getElementById("api-script")) document.body.removeChild(scriptTag);
            delete window[callbackID];
        }

        document.body.appendChild(scriptTag);
    }
</script>

</body>
</html>
